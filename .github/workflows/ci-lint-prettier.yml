# This workflow will do a clean install of node dependencies, and then check lint and prettier formatting.
# See: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Lint and Prettier
permissions: {}

on:
  push:
    branches: [master, develop, sf-qa, sf-live]
  pull_request:
  merge_group:

jobs:
  test:
    name: Lint and Prettier
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node_version: ["22.13.0"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703571f95f729b3fc14f16b7aa # v4.0.0
        with:
          version: 9
      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: "pnpm"
          cache-dependency-path: |
            src/SIL.XForge.Scripture/ClientApp/pnpm-lock.yaml
            src/RealtimeServer/pnpm-lock.yaml
      - name: Realtime Server Lint check
        run: cd src/RealtimeServer && (pnpm install --frozen-lockfile || (sleep 3m && pnpm install --frozen-lockfile)) && pnpm lint
      - name: Realtime Server Prettier format check
        run: cd src/RealtimeServer && pnpm prettier:ci
      - name: Angular Frontend Lint check
        run: cd src/SIL.XForge.Scripture/ClientApp && (pnpm install --frozen-lockfile || (sleep 3m && pnpm install --frozen-lockfile)) && pnpm lint
      - name: Angular Frontend Prettier format check
        run: cd src/SIL.XForge.Scripture/ClientApp && pnpm prettier:ci
