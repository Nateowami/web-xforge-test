# Checks that a PR has the required labels before merging is allowed.
# Posts a commit status (pending or success) rather than failing the workflow run,
# so that the merge button stays blocked without showing a red failure.
name: Check PR labels
permissions: {}

on:
  pull_request_target:
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  check-labels:
    name: "Check PR labels"
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Check labels and set commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          # toJSON produces a JSON array of label name strings, e.g. ["testing complete","do not merge"]
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          HAS_TESTING_COMPLETE=$(echo "$LABELS_JSON" | jq 'map(select(. == "testing complete")) | length > 0')
          HAS_TESTING_NOT_REQUIRED=$(echo "$LABELS_JSON" | jq 'map(select(. == "testing not required")) | length > 0')
          HAS_DO_NOT_MERGE=$(echo "$LABELS_JSON" | jq 'map(select(. == "do not merge")) | length > 0')

          if [ "$HAS_DO_NOT_MERGE" = "true" ]; then
            STATE="pending"
            DESCRIPTION="Remove the 'do not merge' label before merging"
          elif [ "$HAS_TESTING_COMPLETE" = "true" ] || [ "$HAS_TESTING_NOT_REQUIRED" = "true" ]; then
            STATE="success"
            DESCRIPTION="PR is ready to merge"
          else
            STATE="pending"
            DESCRIPTION="Add 'testing complete' or 'testing not required' label before merging"
          fi

          gh api \
            "repos/${REPO}/statuses/${SHA}" \
            -f "state=${STATE}" \
            -f "description=${DESCRIPTION}" \
            -f "context=Merge readiness"
