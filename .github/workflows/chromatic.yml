name: "Chromatic"
permissions: {}

on:
  pull_request:
  merge_group:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  chromatic-deployment:
    name: "Deploy Storybook to Chromatic"
    strategy:
      matrix:
        os: ["ubuntu-24.04"]
        node_version: ["22.13.0"]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # Chromatic requires git history
          ref: ${{ github.event.pull_request.head.sha }} # Chromatic needs the PR branch, not the merge to master
      - name: "Deps: pnpm"
        uses: pnpm/action-setup@fe02b34f77f8bc703571f95f729b3fc14f16b7aa # v4.0.0
        with:
          version: 9
      - name: "Deps: Node"
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{matrix.node_version}}
          cache: "pnpm"
          cache-dependency-path: |
            src/SIL.XForge.Scripture/ClientApp/pnpm-lock.yaml
            src/RealtimeServer/pnpm-lock.yaml
      - name: Pre-build report
        run: |
          set -xueo pipefail
          lsb_release -a
          which node
          node --version
          which pnpm
          pnpm --version
      - name: "Ensure desired tool versions"
        # The build machine may come with newer tools than we are ready for.
        env:
          NODE_VERSION: ${{matrix.node_version}}
        run: |
          set -xueo pipefail
          [[ $(node --version) == v${NODE_VERSION} ]]

      - name: "Deps: RealtimeServer pnpm"
        run: cd src/RealtimeServer && (pnpm install --frozen-lockfile || (sleep 3m && pnpm install --frozen-lockfile))
      - name: "Deps: Frontend pnpm"
        run: cd src/SIL.XForge.Scripture/ClientApp && (pnpm install --frozen-lockfile || (sleep 3m && pnpm install --frozen-lockfile))

      - name: "Build: Backend, RealtimeServer"
        run: cd src/RealtimeServer && pnpm build
      - name: "Build: Frontend"
        run: cd src/SIL.XForge.Scripture/ClientApp && pnpm build

      - name: Build Storybook
        run: cd src/SIL.XForge.Scripture/ClientApp && pnpm build-storybook -- --webpack-stats-json
      - id: publish
        name: Publish to Chromatic
        uses: chromaui/action@f1f9e3277eb1eaa8cba4c6bcebc9809291ee29ea # v15.0.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: src/SIL.XForge.Scripture/ClientApp
          storybookBuildDir: storybook-static
          # Auto accept changes on master branch so we have a clean baseline
          autoAcceptChanges: "master"
          # Ignore any past builds on the branch that triggered the workflow. This prevents rebased branches from
          # having the wrong baseline. On master this shouldn't have any effect because autoAcceptChanges is true.
          ignoreLastBuildOnBranch: ${{ github.ref }}
          onlyChanged: true
          externals: |
            - '*.scss'
          # Force a rebuild even if Chromatic thinks there are no changes
          forceRebuild: true
      - name: Run Storybook tests
        run: cd src/SIL.XForge.Scripture/ClientApp && pnpm test-storybook -- --no-index-json
        env:
          TARGET_URL: "${{steps.publish.outputs.storybookUrl}}"
